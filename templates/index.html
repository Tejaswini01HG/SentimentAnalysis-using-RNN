<!DOCTYPE html>
<html>
<head>
    <title>Sentiment Analysis</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
<div class="overlay">
<div class="box">

<h1>Sentiment Analysis</h1>

<form action="/predict" method="post">
<textarea name="review" placeholder="Enter your review here">{{ review if review else "" }}</textarea>
<br><br>
<button type="submit">Predict</button>
</form>

{% if result %}
<h2>{{ result }}</h2>
{% endif %}

{% if positive is defined %}
<h3>Sentiment Graph</h3>

<p>Positive: {{ positive }}%</p>
<div class="bar">
<div class="positive" style="width: {{ positive }}%;"></div>
</div>

<p>Negative: {{ negative }}%</p>
<div class="bar">
<div class="negative" style="width: {{ negative }}%;"></div>
</div>
{% endif %}

</div>
</div>
</body>
</html>
